<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransitOps Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5B2EFF,#7B4DFF,#A855F7);
}

.login-container{
    width:900px;
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    animation:fadeIn .8s ease;
}

.logo{
    width:45%;
    background:linear-gradient(135deg,#5B2EFF,#8E2DE2);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px;
    text-align:center;
}

.logo h1{
    font-size:42px;
    margin-bottom:15px;
}

.logo p{
    font-size:16px;
    line-height:1.6;
    opacity:.9;
}

form{
    width:55%;
    padding:50px;
}

form h2{
    color:#5B2EFF;
    margin-bottom:30px;
    text-align:center;
    font-size:30px;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    color:#555;
    font-weight:600;
}

.input-box input{
    width:100%;
    padding:14px;
    border:2px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:15px;
    transition:.3s;
}

.input-box input:focus{
    border-color:#7B4DFF;
    box-shadow:0 0 10px rgba(123,77,255,.25);
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#5B2EFF,#8E2DE2);
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(91,46,255,.35);
}

.register{
    margin-top:25px;
    text-align:center;
    color:#666;
}

.register a{
    color:#5B2EFF;
    text-decoration:none;
    font-weight:bold;
}

.register a:hover{
    text-decoration:underline;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

.login-container{
    width:90%;
    flex-direction:column;
}

.logo,
form{
    width:100%;
}

.logo{
    padding:35px;
}

form{
    padding:35px;
}

}
</style>

</head>
<body>

<div class="login-container">

    <div class="logo">
        <h1>🚌 TransitOps</h1>
        <p>Smart Transport Operations Platform</p>
    </div>


    <form action="dashboard.html" method="get">

        <h2>Welcome Back</h2>

        <div class="input-box">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">Login</button>

        <p class="register">
            Don't have an account?
         <a href="register.html">Register</a>
         <p class="register">
    Don't have an account?
    <a href="register.html">Register</a>
</p>

<p class="register">
    Driver?
    <a href="driver-login.html">Driver Login</a>
</p>
        </p>

    </form>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TransitOps Register</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}


body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5B2EFF,#7B4DFF,#A855F7);

}


/* Main Card */

.register-container{

    width:420px;
    background:white;
    padding:35px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);

}



/* Logo */


.logo{

    text-align:center;
    margin-bottom:25px;

}


.logo h1{

    color:#6A11CB;
    font-size:32px;

}


.logo p{

    color:#777;
    margin-top:8px;

}





h2{

    text-align:center;
    color:#333;
    margin-bottom:25px;

}





/* Input */


.input-box{

    margin-bottom:18px;

}


.input-box label{

    display:block;
    margin-bottom:8px;
    color:#555;
    font-weight:600;

}


.input-box input,
.input-box select{

    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:15px;
    transition:.3s;

}


.input-box input:focus,
.input-box select:focus{

    border-color:#6A11CB;
    box-shadow:0 0 8px rgba(106,17,203,.3);

}





/* Button */


button{

    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#6A11CB;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;

}


button:hover{

    background:#4B0FA8;
    transform:translateY(-2px);

}





/* Login Link */


.login{

    text-align:center;
    margin-top:20px;
    color:#555;

}


.login a{

    color:#6A11CB;
    font-weight:bold;
    text-decoration:none;

}





/* Responsive */

@media(max-width:500px){

.register-container{

width:90%;

}

}

</style>


</head>


<body>



<div class="register-container">


<div class="logo">

<h1>🚌 TransitOps</h1>

<p>Smart Transport Operations Platform</p>

</div>



<h2>Create Account</h2>




<form action="dashboard.html" method="get">



<div class="input-box">

<label>Full Name</label>

<input type="text" placeholder="Enter Full Name" required>

</div>




<div class="input-box">

<label>Email</label>

<input type="email" placeholder="Enter Email" required>

</div>





<div class="input-box">

<label>Phone Number</label>

<input type="tel" placeholder="Enter Phone Number" required>

</div>





<div class="input-box">

<label>User Role</label>

<select required>

<option value="">Select Role</option>

<option>Admin</option>

<option>Manager</option>

<option>Driver</option>

</select>

</div>





<div class="input-box">

<label>Password</label>

<input type="password" placeholder="Create Password" required>

</div>





<div class="input-box">

<label>Confirm Password</label>

<input type="password" placeholder="Confirm Password" required>

</div>





<button type="submit">

Register

</button>





<p class="login">

Already have an account?

<a href="login.html">

Login

</a>

</p>




</form>



</div>



</body>

</html>

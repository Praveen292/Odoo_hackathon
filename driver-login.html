<!DOCTYPE html>
<html>
<head>
<title>Driver Login - TransitOps</title>

<style>

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5B2EFF,#A855F7);
    font-family:'Segoe UI',sans-serif;
}

.login-box{
    width:400px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

h2{
    text-align:center;
    color:#5B2EFF;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:2px solid #ddd;
}

button{
    width:100%;
    padding:15px;
    background:#5B2EFF;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#4016c7;
}

</style>

</head>


<body>

<div class="login-box">

<h2>Driver Login 🚌</h2>

<input type="text" id="driverId" placeholder="Driver ID">

<input type="password" id="password" placeholder="Password">


<button onclick="driverLogin()">Login</button>


</div>


<script>

function driverLogin(){

    let id = document.getElementById("driverId").value.trim();
    let pass = document.getElementById("password").value.trim();

    alert("Entered ID: " + id + "\nEntered Password: " + pass);

    if(id === "driver01" && pass === "12345")
    {
        window.location.href = "drivers.html";
    }
    else
    {
        alert("Invalid Driver ID or Password");
    }

}

</script>


</body>
</html>


</body>
</html>
